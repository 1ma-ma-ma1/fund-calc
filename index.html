<!DOCTYPE html>
<html lang="ja">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1">
<title>資金移動計算</title>

<style>

:root {
  --primary: #4f46e5;
  --primary-light: #818cf8;
  --red: #ef4444;
  --green: #22c55e;
  --bg: #f0f2f8;
  --card: #ffffff;
  --text: #1e1e2e;
  --sub: #6b7280;
  --border: #e5e7eb;
}

* {
  box-sizing: border-box;
  margin: 0;
  padding: 0;
}

body {
  font-family: -apple-system, 'Segoe UI', 'Hiragino Sans', 'Noto Sans JP', sans-serif;
  background: var(--bg);
  min-height: 100vh;
  display: flex;
  align-items: center;
  justify-content: center;
  padding: 16px;
}

.card {
  background: var(--card);
  width: 100%;
  max-width: 460px;
  border-radius: 20px;
  box-shadow: 0 8px 40px rgba(79,70,229,0.12), 0 1px 3px rgba(0,0,0,0.06);
  overflow: hidden;
}

.card-header {
  background: linear-gradient(135deg, var(--primary), var(--primary-light));
  padding: 24px 24px 20px;
  color: #fff;
  text-align: center;
}

.card-header h1 {
  font-size: 20px;
  font-weight: 700;
  letter-spacing: 0.5px;
}

.card-header p {
  font-size: 12px;
  margin-top: 4px;
  opacity: 0.8;
}

.card-body {
  padding: 24px;
}

.field {
  margin-bottom: 16px;
  position: relative;
}

.field label {
  display: block;
  font-size: 12px;
  font-weight: 700;
  color: var(--sub);
  margin-bottom: 6px;
  letter-spacing: 0.3px;
}

.field .input-wrap {
  position: relative;
}

.field .input-wrap .prefix {
  position: absolute;
  left: 14px;
  top: 50%;
  transform: translateY(-50%);
  font-size: 16px;
  color: #aaa;
  pointer-events: none;
}

.field input {
  width: 100%;
  padding: 14px 14px 14px 32px;
  font-size: 20px;
  font-weight: 600;
  color: var(--text);
  border: 2px solid var(--border);
  border-radius: 12px;
  outline: none;
  background: #fafbfc;
  transition: border-color 0.2s, box-shadow 0.2s;
  text-align: right;
}

.field input::placeholder {
  color: #ccc;
  font-weight: 400;
}

.field input:focus {
  border-color: var(--primary);
  box-shadow: 0 0 0 3px rgba(79,70,229,0.1);
  background: #fff;
}

.field input.invalid {
  border-color: var(--red);
  box-shadow: 0 0 0 3px rgba(239,68,68,0.1);
}

.error-toast {
  background: #fef2f2;
  border: 1px solid #fecaca;
  color: var(--red);
  padding: 10px 14px;
  border-radius: 10px;
  font-size: 13px;
  font-weight: 600;
  text-align: center;
  margin-bottom: 16px;
  display: none;
  animation: shake 0.3s;
}

@keyframes shake {
  0%,100% { transform: translateX(0); }
  25% { transform: translateX(-6px); }
  75% { transform: translateX(6px); }
}

.results {
  border-top: 2px solid var(--border);
  padding-top: 20px;
  margin-top: 8px;
  opacity: 0;
  max-height: 0;
  overflow: hidden;
  transition: opacity 0.4s ease, max-height 0.5s ease;
}

.results.visible {
  opacity: 1;
  max-height: 800px;
}

.section-label {
  font-size: 10px;
  font-weight: 800;
  color: var(--primary);
  text-transform: uppercase;
  letter-spacing: 1.5px;
  margin-bottom: 8px;
  margin-top: 16px;
}

.section-label:first-child {
  margin-top: 0;
}

.row {
  display: flex;
  justify-content: space-between;
  align-items: center;
  padding: 6px 0;
}

.row .lbl {
  font-size: 14px;
  color: var(--sub);
}

.row .val {
  font-size: 16px;
  font-weight: 700;
  color: var(--text);
  font-variant-numeric: tabular-nums;
}

.row .val.primary { color: var(--primary); font-size: 18px; }
.row .val.red { color: var(--red); }
.row .val.green { color: var(--green); font-size: 18px; }

.divider {
  border: none;
  border-top: 1px dashed var(--border);
  margin: 14px 0;
}

.bar-wrap {
  margin-top: 8px;
  margin-bottom: 4px;
}

.bar-bg {
  width: 100%;
  height: 10px;
  background: #e9ecf5;
  border-radius: 5px;
  overflow: hidden;
  position: relative;
}

.bar-fill {
  height: 100%;
  border-radius: 5px;
  transition: width 0.5s ease;
  background: linear-gradient(90deg, var(--primary), var(--primary-light));
}

.bar-labels {
  display: flex;
  justify-content: space-between;
  font-size: 11px;
  color: var(--sub);
  margin-top: 3px;
}

.footer-note {
  text-align: center;
  font-size: 11px;
  color: #bbb;
  margin-top: 20px;
  padding-top: 16px;
  border-top: 1px solid var(--border);
}

</style>
</head>

<body>

<div class="card">

  <div class="card-header">
    <h1>&#128176; 資金移動計算ツール</h1>
    <p>入力するとリアルタイムで自動計算されます</p>
  </div>

  <div class="card-body">

    <div class="field">
      <label>現在の資金（残高）</label>
      <div class="input-wrap">
        <span class="prefix">&#165;</span>
        <input id="inFund" type="text" inputmode="decimal" placeholder="0" autocomplete="off">
      </div>
    </div>

    <div class="field">
      <label>現在のクレジット</label>
      <div class="input-wrap">
        <span class="prefix">&#165;</span>
        <input id="inCredit" type="text" inputmode="decimal" placeholder="0" autocomplete="off">
      </div>
    </div>

    <div class="field">
      <label>移動資金</label>
      <div class="input-wrap">
        <span class="prefix">&#165;</span>
        <input id="inMove" type="text" inputmode="decimal" placeholder="0" autocomplete="off">
      </div>
    </div>

    <div id="error" class="error-toast"></div>

    <div id="results" class="results">

      <div class="section-label">現在の口座</div>

      <div class="row">
        <span class="lbl">資金合計</span>
        <span class="val primary" id="oTotal">-</span>
      </div>

      <div class="row">
        <span class="lbl">クレジット割合</span>
        <span class="val" id="oRatio">-</span>
      </div>

      <div class="bar-wrap">
        <div class="bar-bg"><div class="bar-fill" id="oBar" style="width:0%"></div></div>
        <div class="bar-labels">
          <span>0%</span>
          <span id="oBarLabel">0%</span>
        </div>
      </div>

      <div class="row">
        <span class="lbl">クレジット移動（消滅）額</span>
        <span class="val red" id="oCreditMove">-</span>
      </div>

      <div class="divider"></div>
      <div class="section-label">移動後 ─ 現在の口座</div>

      <div class="row">
        <span class="lbl">残高</span>
        <span class="val" id="oAfterFund">-</span>
      </div>
      <div class="row">
        <span class="lbl">クレジット</span>
        <span class="val" id="oAfterCredit">-</span>
      </div>
      <div class="row">
        <span class="lbl">合計</span>
        <span class="val primary" id="oAfterTotal">-</span>
      </div>

      <div class="divider"></div>
      <div class="section-label">移動先の口座</div>

      <div class="row">
        <span class="lbl">資金</span>
        <span class="val green" id="oMoveFund">-</span>
      </div>
      <div class="row">
        <span class="lbl">クレジット</span>
        <span class="val green" id="oMoveCredit">-</span>
      </div>
      <div class="row">
        <span class="lbl">合計</span>
        <span class="val green" id="oMoveTotal">-</span>
      </div>

    </div>

    <div class="footer-note">
      すべての計算はブラウザ内で完結します<br>データは外部に送信されません
    </div>

  </div>
</div>

<script>

function fmt(n) {
  if (n === null || n === undefined || isNaN(n)) return '-';
  return '\u00a5' + Math.floor(n).toLocaleString('ja-JP');
}

function parse(s) {
  if (!s) return NaN;
  return parseFloat(s.replace(/[\u00a5,\s]/g, ''));
}

function autoFormat(el) {
  var pos = el.selectionStart;
  var oldLen = el.value.length;
  var raw = el.value.replace(/[^0-9.]/g, '');
  if (!raw) { el.value = ''; return; }
  var num = parseFloat(raw);
  if (isNaN(num)) return;
  if (raw.endsWith('.')) return;
  var decimals = raw.indexOf('.') !== -1 ? raw.split('.')[1].length : 0;
  el.value = num.toLocaleString('ja-JP', {
    minimumFractionDigits: decimals,
    maximumFractionDigits: decimals
  });
  var newLen = el.value.length;
  var newPos = pos + (newLen - oldLen);
  if (newPos < 0) newPos = 0;
  el.setSelectionRange(newPos, newPos);
}

function calc() {

  var elFund   = document.getElementById('inFund');
  var elCredit = document.getElementById('inCredit');
  var elMove   = document.getElementById('inMove');
  var elError  = document.getElementById('error');
  var elResult = document.getElementById('results');

  autoFormat(elFund);
  autoFormat(elCredit);
  autoFormat(elMove);

  var rawF = elFund.value.trim();
  var rawC = elCredit.value.trim();
  var rawM = elMove.value.trim();

  if (!rawF && !rawC && !rawM) {
    elResult.classList.remove('visible');
    elError.style.display = 'none';
    elFund.classList.remove('invalid');
    elCredit.classList.remove('invalid');
    elMove.classList.remove('invalid');
    return;
  }

  var fund   = rawF ? parse(rawF) : 0;
  var credit = rawC ? parse(rawC) : 0;
  var move   = rawM ? parse(rawM) : 0;

  var err = [];
  elFund.classList.remove('invalid');
  elCredit.classList.remove('invalid');
  elMove.classList.remove('invalid');

  if (rawF && isNaN(fund))   { err.push('資金が数値ではありません'); elFund.classList.add('invalid'); }
  if (rawC && isNaN(credit)) { err.push('クレジットが数値ではありません'); elCredit.classList.add('invalid'); }
  if (rawM && isNaN(move))   { err.push('移動資金が数値ではありません'); elMove.classList.add('invalid'); }

  if (!err.length && move < 0) {
    err.push('移動資金は0以上にしてください');
    elMove.classList.add('invalid');
  }

  if (!err.length && fund <= 0 && move > 0) {
    err.push('現在の資金が0以下のため計算できません');
    elFund.classList.add('invalid');
  }

  if (!err.length && move > fund) {
    err.push('移動資金が現在の資金を超えています');
    elMove.classList.add('invalid');
  }

  if (err.length) {
    elError.textContent = err[0];
    elError.style.display = 'block';
    elResult.classList.remove('visible');
    return;
  }

  elError.style.display = 'none';

  /* ── 計算ロジック ── */

  // 資金合計 = 現在の資金 + 現在のクレジット
  var total = fund + credit;

  // クレジット割合 = 移動資金 / 現在の資金
  var ratio = fund > 0 ? move / fund : 0;

  // クレジット移動（消滅）額 = 現在のクレジット × クレジット割合
  var creditMove = credit * ratio;

  // 移動後の現在の口座
  var afterFund   = fund - move;
  var afterCredit = credit - creditMove;
  var afterTotal  = afterFund + afterCredit;

  // 移動先の口座
  var moveFund   = move;
  var moveCredit = creditMove;
  var moveTotal  = moveFund + moveCredit;

  /* ── 結果反映 ── */
  document.getElementById('oTotal').textContent       = fmt(total);
  document.getElementById('oRatio').textContent       = (ratio * 100).toFixed(1) + '%';

  var barWidth = ratio > 1 ? 100 : ratio * 100;
  document.getElementById('oBar').style.width         = barWidth.toFixed(1) + '%';
  document.getElementById('oBarLabel').textContent    = (ratio * 100).toFixed(1) + '%';

  document.getElementById('oCreditMove').textContent  = fmt(creditMove);
  document.getElementById('oAfterFund').textContent   = fmt(afterFund);
  document.getElementById('oAfterCredit').textContent = fmt(afterCredit);
  document.getElementById('oAfterTotal').textContent  = fmt(afterTotal);
  document.getElementById('oMoveFund').textContent    = fmt(moveFund);
  document.getElementById('oMoveCredit').textContent  = fmt(moveCredit);
  document.getElementById('oMoveTotal').textContent   = fmt(moveTotal);

  elResult.classList.add('visible');
}

document.querySelectorAll('input').forEach(function(el) {
  el.addEventListener('input', calc);
});

</script>

</body>
</html>
