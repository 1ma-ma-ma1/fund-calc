<!DOCTYPE html>
<html lang="ja">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1">
<title>資金移動計算</title>

<style>

:root {
  --primary: #4f46e5;
  --primary-light: #818cf8;
  --red: #ef4444;
  --green: #22c55e;
  --bg: #f0f2f8;
  --card: #ffffff;
  --text: #1e1e2e;
  --sub: #6b7280;
  --border: #e5e7eb;
}

* {
  box-sizing: border-box;
  margin: 0;
  padding: 0;
}

body {
  font-family: -apple-system, 'Segoe UI', 'Hiragino Sans', 'Noto Sans JP', sans-serif;
  background: var(--bg);
  min-height: 100vh;
  display: flex;
  align-items: center;
  justify-content: center;
  padding: 16px;
}

.card {
  background: var(--card);
  width: 100%;
  max-width: 460px;
  border-radius: 20px;
  box-shadow: 0 8px 40px rgba(79,70,229,0.12), 0 1px 3px rgba(0,0,0,0.06);
  overflow: hidden;
}

.card-header {
  background: linear-gradient(135deg, var(--primary), var(--primary-light));
  padding: 24px 24px 20px;
  color: #fff;
  text-align: center;
}

.card-header h1 {
  font-size: 20px;
  font-weight: 700;
  letter-spacing: 0.5px;
}

.card-header p {
  font-size: 12px;
  margin-top: 4px;
  opacity: 0.8;
}

.card-body {
  padding: 24px;
}

/* 入力グループ */
.field {
  margin-bottom: 16px;
  position: relative;
}

.field label {
  display: block;
  font-size: 12px;
  font-weight: 700;
  color: var(--sub);
  margin-bottom: 6px;
  letter-spacing: 0.3px;
}

.field .input-wrap {
  position: relative;
}

.field .input-wrap .prefix {
  position: absolute;
  left: 14px;
  top: 50%;
  transform: translateY(-50%);
  font-size: 16px;
  color: #aaa;
  pointer-events: none;
}

.field input {
  width: 100%;
  padding: 14px 14px 14px 32px;
  font-size: 20px;
  font-weight: 600;
  color: var(--text);
  border: 2px solid var(--border);
  border-radius: 12px;
  outline: none;
  background: #fafbfc;
  transition: border-color 0.2s, box-shadow 0.2s;
  text-align: right;
}

.field input::placeholder {
  color: #ccc;
  font-weight: 400;
}

.field input:focus {
  border-color: var(--primary);
  box-shadow: 0 0 0 3px rgba(79,70,229,0.1);
  background: #fff;
}

.field input.invalid {
  border-color: var(--red);
  box-shadow: 0 0 0 3px rgba(239,68,68,0.1);
}

/* エラー */
.error-toast {
  background: #fef2f2;
  border: 1px solid #fecaca;
  color: var(--red);
  padding: 10px 14px;
  border-radius: 10px;
  font-size: 13px;
  font-weight: 600;
  text-align: center;
  margin-bottom: 16px;
  display: none;
  animation: shake 0.3s;
}

@keyframes shake {
  0%,100% { transform: translateX(0); }
  25% { transform: translateX(-6px); }
  75% { transform: translateX(6px); }
}

/* 結果エリア */
.results {
  border-top: 2px solid var(--border);
  padding-top: 20px;
  margin-top: 8px;
  opacity: 0;
  max-height: 0;
  overflow: hidden;
  transition: opacity 0.4s ease, max-height 0.5s ease;
}

.results.visible {
  opacity: 1;
  max-height: 600px;
}

.section-label {
  font-size: 10px;
  font-weight: 800;
  color: var(--primary);
  text-transform: uppercase;
  letter-spacing: 1.5px;
  margin-bottom: 8px;
  margin-top: 16px;
}

.section-label:first-child {
  margin-top: 0;
}

.row {
  display: flex;
  justify-content: space-between;
  align-items: center;
  padding: 6px 0;
}

.row .lbl {
  font-size: 14px;
  color: var(--sub);
}

.row .val {
  font-size: 16px;
  font-weight: 700;
  color: var(--text);
  font-variant-numeric: tabular-nums;
}

.row .val.primary { color: var(--primary); font-size: 18px; }
.row .val.red { color: var(--red); }
.row .val.green { color: var(--green); font-size: 18px; }

.divider {
  border: none;
  border-top: 1px dashed var(--border);
  margin: 14px 0;
}

/* バー表示 */
.bar-wrap {
  margin-top: 8px;
  margin-bottom: 4px;
}

.bar-bg {
  width: 100%;
  height: 10px;
  background: #e9ecf5;
  border-radius: 5px;
  overflow: hidden;
  position: relative;
}

.bar-fill {
  height: 100%;
  border-radius: 5px;
  transition: width 0.5s ease;
  background: linear-gradient(90deg, var(--primary), var(--primary-light));
}

.bar-labels {
  display: flex;
  justify-content: space-between;
  font-size: 11px;
  color: var(--sub);
  margin-top: 3px;
}

.footer-note {
  text-align: center;
  font-size: 11px;
  color: #bbb;
  margin-top: 20px;
  padding-top: 16px;
  border-top: 1px solid var(--border);
}

</style>
</head>

<body>

<div class="card">

  <div class="card-header">
    <h1>💰 資金移動計算ツール</h1>
    <p>入力するとリアルタイムで自動計算されます</p>
  </div>

  <div class="card-body">

    <div class="field">
      <label>現在の資金（残高）</label>
      <div class="input-wrap">
        <span class="prefix">¥</span>
        <input id="inFund" type="text" inputmode="decimal" placeholder="0" autocomplete="off">
      </div>
    </div>

    <div class="field">
      <label>現在のクレジット</label>
      <div class="input-wrap">
        <span class="prefix">¥</span>
        <input id="inCredit" type="text" inputmode="decimal" placeholder="0" autocomplete="off">
      </div>
    </div>

    <div class="field">
      <label>移動金額</label>
      <div class="input-wrap">
        <span class="prefix">¥</span>
        <input id="inMove" type="text" inputmode="decimal" placeholder="0" autocomplete="off">
      </div>
    </div>

    <div id="error" class="error-toast"></div>

    <div id="results" class="results">

      <div class="section-label">現在の状況</div>

      <div class="row">
        <span class="lbl">資金合計</span>
        <span class="val primary" id="oTotal">-</span>
      </div>

      <div class="row">
        <span class="lbl">クレジット割合</span>
        <span class="val" id="oRatio">-</span>
      </div>

      <div class="bar-wrap">
        <div class="bar-bg"><div class="bar-fill" id="oBar" style="width:0%"></div></div>
        <div class="bar-labels">
          <span>資金</span>
          <span>クレジット</span>
        </div>
      </div>

      <div class="divider"></div>

      <div class="row">
        <span class="lbl">クレジット削除額</span>
        <span class="val red" id="oCreditMove">-</span>
      </div>

      <div class="divider"></div>
      <div class="section-label">移動後 ─ 現在の口座</div>

      <div class="row">
        <span class="lbl">残高</span>
        <span class="val" id="oAfterFund">-</span>
      </div>
      <div class="row">
        <span class="lbl">クレジット</span>
        <span class="val" id="oAfterCredit">-</span>
      </div>
      <div class="row">
        <span class="lbl">合計</span>
        <span class="val primary" id="oAfterTotal">-</span>
      </div>

      <div class="divider"></div>
      <div class="section-label">移動先口座</div>

      <div class="row">
        <span class="lbl">移動先に入金される額</span>
        <span class="val green" id="oMoveAccount">-</span>
      </div>

    </div>

    <div class="footer-note">
      すべての計算はブラウザ内で完結します<br>データは外部に送信されません
    </div>

  </div>
</div>

<script>

/* ── ユーティリティ ── */

// カンマ付き表示
function fmt(n) {
  if (n === null || n === undefined || isNaN(n)) return '-';
  return '¥' + Math.floor(n).toLocaleString('ja-JP');
}

// 入力文字列 → 数値（カンマ・¥除去）
function parse(s) {
  if (!s) return NaN;
  return parseFloat(s.replace(/[¥,\s]/g, ''));
}

// 入力欄に自動カンマ挿入
function autoFormat(el) {
  const raw = el.value.replace(/[^0-9.]/g, '');
  if (!raw) { el.value = ''; return; }
  const num = parseFloat(raw);
  if (isNaN(num)) return;
  // 小数点入力中はそのまま
  if (raw.endsWith('.')) return;
  const decimals = raw.includes('.') ? raw.split('.')[1].length : 0;
  el.value = num.toLocaleString('ja-JP', {
    minimumFractionDigits: decimals,
    maximumFractionDigits: decimals
  });
}

/* ── メイン計算 ── */

function calc() {

  const elFund   = document.getElementById('inFund');
  const elCredit = document.getElementById('inCredit');
  const elMove   = document.getElementById('inMove');
  const elError  = document.getElementById('error');
  const elResult = document.getElementById('results');

  // 自動カンマフォーマット
  autoFormat(elFund);
  autoFormat(elCredit);
  autoFormat(elMove);

  const rawF = elFund.value.trim();
  const rawC = elCredit.value.trim();
  const rawM = elMove.value.trim();

  // 全部空 → 非表示
  if (!rawF && !rawC && !rawM) {
    elResult.classList.remove('visible');
    elError.style.display = 'none';
    [elFund, elCredit, elMove].forEach(e => e.classList.remove('invalid'));
    return;
  }

  const fund   = rawF ? parse(rawF) : 0;
  const credit = rawC ? parse(rawC) : 0;
  const move   = rawM ? parse(rawM) : 0;

  // バリデーション
  let err = [];
  elFund.classList.remove('invalid');
  elCredit.classList.remove('invalid');
  elMove.classList.remove('invalid');

  if (rawF && isNaN(fund))   { err.push('資金が数値ではありません'); elFund.classList.add('invalid'); }
  if (rawC && isNaN(credit)) { err.push('クレジットが数値ではありません'); elCredit.classList.add('invalid'); }
  if (rawM && isNaN(move))   { err.push('移動金額が数値ではありません'); elMove.classList.add('invalid'); }

  if (!err.length && move < 0) {
    err.push('移動金額は0以上にしてください');
    elMove.classList.add('invalid');
  }

  const total = (isNaN(fund) ? 0 : fund) + (isNaN(credit) ? 0 : credit);

  if (!err.length && move > total) {
    err.push('移動金額が資金合計を超えています');
    elMove.classList.add('invalid');
  }

  if (!err.length && total <= 0 && move > 0) {
    err.push('資金合計が0以下のため移動できません');
  }

  if (err.length) {
    elError.textContent = err[0];
    elError.style.display = 'block';
    elResult.classList.remove('visible');
    return;
  }

  elError.style.display = 'none';

  /* ── 計算ロジック ── */
  const ratio      = total > 0 ? credit / total : 0;
  const creditMove = move * ratio;
  const fundMove   = move - creditMove;

  const afterFund   = fund - fundMove;
  const afterCredit = credit - creditMove;
  const afterTotal  = afterFund + afterCredit;
  const moveAccount = fundMove;

  /* ── 結果反映 ── */
  document.getElementById('oTotal').textContent       = fmt(total);
  document.getElementById('oRatio').textContent       = (ratio * 100).toFixed(1) + '%';
  document.getElementById('oBar').style.width         = ((1 - ratio) * 100).toFixed(1) + '%';
  document.getElementById('oCreditMove').textContent  = '−' + fmt(creditMove).replace('¥','¥');
  document.getElementById('oAfterFund').textContent   = fmt(afterFund);
  document.getElementById('oAfterCredit').textContent = fmt(afterCredit);
  document.getElementById('oAfterTotal').textContent  = fmt(afterTotal);
  document.getElementById('oMoveAccount').textContent = fmt(moveAccount);

  elResult.classList.add('visible');
}

/* ── イベント登録 ── */
document.querySelectorAll('input').forEach(function(el) {
  el.addEventListener('input', calc);
});

</script>

</body>
</html>
